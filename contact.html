<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Resume Craft Academy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
}

.navbar {
    background-color: #0b3d91;
}

.navbar-brand img {
    height: 45px;
}

.contact-header {
    background: linear-gradient(to right, #0b3d91, #0aa06e);
    padding: 70px 20px;
    color: white;
    text-align: center;
}

.contact-section {
    padding: 80px 20px;
}

.info-box {
    background: #f8f9fa;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.form-box {
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.btn-brand {
    background-color: #0aa06e;
    color: white;
    border-radius: 30px;
    padding: 12px 30px;
    font-weight: bold;
}

.btn-brand:hover {
    background-color: #088f60;
    color: white;
}
</style>
</head>

<body>

<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">

    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="/logo.png" alt="Resume Craft Logo" class="me-2">
      <span class="fw-bold text-white">ResumeCraft</span>
    </a>

    <div class="ms-auto">
      <a href="index.html" class="text-white text-decoration-none me-3">Home</a>
      <a href="contact.html" class="text-white text-decoration-none">Contact</a>
    </div>

  </div>
</nav>

<!-- Header -->

<section class="contact-header">
  <h1>Contact Resume Craft Academy</h1>
  <p>We are here to help you grow your career</p>
</section>

<!-- Contact Section -->
<section class="contact-section">
  <div class="container">
    <div class="row g-5">

      <!-- Contact Information -->
      <div class="col-md-5">
        <div class="info-box">
          <h4>Contact Information</h4>
          <hr>

          <p><strong>Email:</strong><br>
          <a href="mailto:YOUR_EMAIL@gmail.com">resumecraft.careers@gmail.com</a></p>

          <p><strong>Phone:</strong><br>
          <a href="tel:+917827604439">+91 7827604439</a></p>

          <p><strong>WhatsApp:</strong><br>
          <a href="https://wa.me/917827604439" target="_blank">Chat on WhatsApp</a></p>

          <p class="mt-4">We typically respond within 24 hours.</p>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="col-md-7">
        <div class="form-box">
          <h4>Send Us a Message</h4>
          <hr>

          <form action="https://formsubmit.co/resumecraft.careers@gmail.com" method="POST">

            <!-- Hidden Fields -->
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="New ResumeCraft Website Inquiry">
            <input type="hidden" name="_autoresponse" value="Thank you for contacting Resume Craft Academy. We have received your message and will contact you shortly.">
            <input type="hidden" name="_next" value="https://resumecraftacademy.github.io/thankyou.html">

            <div class="mb-3">
              <input type="text" name="name" class="form-control" placeholder="Your Name" required>
            </div>

            <div class="mb-3">
              <input type="email" name="email" class="form-control" placeholder="Your Email" required>
            </div>

            <div class="mb-3">
              <textarea name="message" class="form-control" rows="4" placeholder="Your Message" required></textarea>
            </div>

            <button type="submit" class="btn btn-brand">Send Message</button>

          </form>
        </div>
      </div>

    </div>
  </div>
</section>

</body>
</html>
